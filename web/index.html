  <!--
    Pre-initialize Firebase + Firestore with FORCED long polling BEFORE Flutter
    loads. iOS Safari (and some PWA / corporate-network contexts) cannot
    establish Firestore's default WebChannel streaming transport, producing
    "[cloud_firestore/unknown] Unable to establish connection on channel."

    The Dart settings API (FirebaseFirestore.instance.settings = ...) was
    unreliable for forcing long polling, so we initialize Firestore directly
    via the JS SDK here. firebase_core_web checks window.firebase_core and
    skips its own CDN injection when present, so we populate every Firebase
    module the app uses (core/app, auth, firestore). Flutter's
    Firebase.initializeApp() reuses the existing default app (matched by
    apiKey); cloud_firestore_web's getFirestore(app, '(default)') retrieves
    this pre-initialized instance with long polling already active.

    Auth is intentionally NOT initialized here — calling getAuth(app) before
    Dart's firebase_auth plugin runs makes its initializeAuth(app, ...) call
    throw "auth/already-initialized". We only need the module on window.
  -->
  <script type="module">
    try {
      // Must match firebase_core_web's supportedFirebaseJsSdkVersion.
      const FIREBASE_VERSION = '12.12.0';
      const base = `https://www.gstatic.com/firebasejs/${FIREBASE_VERSION}`;

      const [appMod, firestoreMod, authMod] = await Promise.all([
        import(`${base}/firebase-app.js`),
        import(`${base}/firebase-firestore.js`),
        import(`${base}/firebase-auth.js`),
      ]);

      window.firebase_core = appMod;
      window.firebase_app = appMod;
      window.firebase_auth = authMod;
      window.firebase_firestore = firestoreMod;

      const app = appMod.initializeApp({
        apiKey: 'AIzaSyCP6JRS4POzegeRZw1QjKpaxBKoNR-Vn24',
        appId: '1:179997314991:web:c1ec70eefa8b2c5483295a',
        messagingSenderId: '179997314991',
        projectId: 'time-tracker-jm',
        authDomain: 'time-tracker-jm.firebaseapp.com',
        storageBucket: 'time-tracker-jm.firebasestorage.app',
      });

      // useFetchStreams MUST be false alongside experimentalForceLongPolling
      // — the two are mutually incompatible. Leaving useFetchStreams at its
      // default (true) silently keeps the SDK on WebChannel streaming.
      firestoreMod.initializeFirestore(app, {
        experimentalForceLongPolling: true,
        useFetchStreams: false,
      });
    } catch (e) {
      console.error('[firestore-preinit] failed', e);
    }

    const s = document.createElement('script');
    s.src = 'flutter_bootstrap.js';
    document.body.appendChild(s);
  </script>
