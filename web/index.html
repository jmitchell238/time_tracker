<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Property Work Time Tracker — log hours, manage jobs, and generate invoices.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0F172A">

  <!-- iOS PWA meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Time Tracker">

  <style>
    html, body {
      background-color: #0F172A;
      margin: 0;
      padding: 0;
    }
  </style>
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Time Tracker</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    Pre-initialize Firebase + Firestore with FORCED long polling BEFORE Flutter
    loads. iOS Safari (and some PWA / corporate-network contexts) cannot
    establish Firestore's default WebChannel streaming transport, producing
    "[cloud_firestore/unknown] Unable to establish connection on channel."
    The Dart settings API has proven unreliable for forcing long polling on
    real devices, so we initialize Firestore directly via JS interop here.

    firebase_core_web checks for window.firebase_core and skips its own CDN
    injection if present, so we must populate every Firebase module we use.
    Flutter's Firebase.initializeApp() will then find the existing default
    app (matched by apiKey) and reuse it; getFirestore(app) returns this
    pre-initialized instance with long polling already enabled.
  -->
  <script type="module">
    const FIREBASE_VERSION = '11.9.1';
    const base = `https://www.gstatic.com/firebasejs/${FIREBASE_VERSION}`;

    const [appMod, firestoreMod, authMod] = await Promise.all([
      import(`${base}/firebase-app.js`),
      import(`${base}/firebase-firestore.js`),
      import(`${base}/firebase-auth.js`),
    ]);

    window.firebase_core = appMod;
    window.firebase_app = appMod;
    window.firebase_auth = authMod;
    window.firebase_firestore = firestoreMod;

    const app = appMod.initializeApp({
      apiKey: 'AIzaSyCP6JRS4POzegeRZw1QjKpaxBKoNR-Vn24',
      appId: '1:179997314991:web:c1ec70eefa8b2c5483295a',
      messagingSenderId: '179997314991',
      projectId: 'time-tracker-jm',
      authDomain: 'time-tracker-jm.firebaseapp.com',
      storageBucket: 'time-tracker-jm.firebasestorage.app',
    });

    // Must run before any getFirestore(app) call. initializeFirestore() can
    // only be called once per app; subsequent getFirestore(app) returns this
    // instance with long polling enabled.
    firestoreMod.initializeFirestore(app, {
      experimentalForceLongPolling: true,
    });

    const s = document.createElement('script');
    s.src = 'flutter_bootstrap.js';
    document.body.appendChild(s);
  </script>
</body>
</html>
