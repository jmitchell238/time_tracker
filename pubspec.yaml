name: time_tracker
description: "Property Work Time Tracker — track time, generate invoices, shared with wife."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  google_fonts: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.5.1
  firebase_core: ^3.13.0
  firebase_core_web: ^2.24.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.0
  pdf: ^3.11.1
  printing: ^5.13.2
  csv: ^6.0.0
  file_picker: ^8.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  firebase_auth_mocks: ^0.14.2
  fake_cloud_firestore: ^3.0.3

flutter:
  uses-material-design: true
