name: time_tracker
description: "Property Work Time Tracker — track time, generate invoices, shared with wife."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  google_fonts: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.5.1
  firebase_core: ^4.7.0
  firebase_core_web: ^3.6.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  pdf: ^3.11.1
  printing: ^5.13.2
  csv: ^6.0.0
  file_picker: ^8.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  firebase_auth_mocks: ^0.15.1
  fake_cloud_firestore: ^4.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
